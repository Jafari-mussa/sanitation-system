<!DOCTYPE html>
<html>

<head>

<title>Sanitation Feedback System</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<form>


<button type="button" onclick="changeLanguage('en')">
English
</button>

<button type="button" onclick="changeLanguage('sw')">
Kiswahili
</button>

<h1 id="title">Sanitation Feedback Form</h1>


<label id="nameLabel">Name</label>
<input type="text" id="name" placeholder="Enter your name">


<label id="regionLabel">Region</label>
<input type="text" id="region" placeholder="Enter region">


<label id="districtLabel">District</label>
<input type="text" id="district" placeholder="Enter district">

<label id="streetLabel">Street</label>
<input type="text" id="Street" placeholder="Enter Street">


<label id="dateLabel">Date</label>
<input type="date" id="date">



<label id="rateLabel">Rate Service</label>
<select id="rateSelect">
  <option> 1 - Poor</option>
  <option> 2 - Fair</option>
  <option> 3 - Good</option>
  <option> 4 - Very Good</option>
  <option> 5 - Excellent</option>
</select>

<label id="problemLabel">Problem</label>
<textarea id="problem" placeholder="Write feedback"></textarea>




<label id="photoLabel">
Upload Photo Evidence
</label>


<br><br>


<button type="button" onclick="openCamera()">

📷 Open Camera

</button>



<button id="switchBtn" type="button" onclick="switchCamera()">

🔄 Switch Camera

</button>



<br><br>


<video id="camera"  autoplay playsinline></video>


<br>


<button id="captureBtn" type="button" onclick="takePhoto()">

Capture Photo

</button>



<br><br>


<canvas id="photoCanvas" width="300" height="200"></canvas>



<br><br>


<input type="file" accept="image/*">



<br><br>


<button id="submitBtn" type="submit">

Submit Feedback

</button>



</form>


<script src="https://unpkg.com/parse/dist/parse.min.js"></script>

<script src="script.js"></script>


</body>

</html>
